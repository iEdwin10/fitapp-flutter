name: fitapp_flutter
description: Spotify du Workout - Fitness Playlist App MVP

publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.3.2
  wakelock_plus: ^1.2.8
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0
  audioplayers: ^6.1.0
  fl_chart: ^0.69.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
